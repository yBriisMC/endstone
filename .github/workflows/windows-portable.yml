name: Windows (Portable)

on:
  workflow_run:
    workflows: ["Wheel"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'stable' ||
        startsWith(github.event.workflow_run.head_branch, 'v')))
    env:
      WP_URL: https://github.com/winpython/winpython/releases/download/17.2.20250920final/WinPython64-3.13.7.0dot.exe
      WP_SHA256: 75001c40e8507db4c408f298ce8f49d483efb5ebfa9bdfb50a0509d31bd028f5
      WP_BINARY_DIR: WPy64-31700\python

    steps:
      # --- Checkout ---
      - name: Checkout Code (full, for manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Checkout Code (sparse, for workflow_run)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          sparse-checkout: |
            scripts/start.cmd
            CHANGELOG.md
            LICENSE

      # --- Get wheel: download artifact or build from scratch ---
      - name: Download Wheel Artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v7
        with:
          name: endstone-wheels-cp313-win_amd64
          path: wheelhouse
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Conan (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/setup-conan
        with:
          build-type: RelWithDebInfo
          install-dependencies: 'false'

      - name: Set up MSVC (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86_64

      - name: Set up CMake and Ninja (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: lukka/get-cmake@latest

      - name: Build wheels (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: pypa/cibuildwheel@v3.3.1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          CIBW_BUILD: cp313-win_amd64
          CIBW_BUILD_VERBOSITY: 1

      # --- Bundle with WinPython ---
      - name: Install Winpython
        run: |
          Invoke-WebRequest -OutFile winpython.exe ${{ env.WP_URL }}
          $file_hash = (Get-FileHash winpython.exe ).Hash
          if ($file_hash -ne "${{ env.WP_SHA256 }}") { exit(1) }
          .\winpython.exe -y

      - name: Install Endstone
        shell: pwsh
        run: |
          $file = Get-ChildItem -Path .\wheelhouse -Filter *.whl | Select-Object -First 1
          ${{ env.WP_BINARY_DIR }}\python.exe -m pip install $file.FullName

      - name: Clean Up
        run: |
          ${{ env.WP_BINARY_DIR }}\python.exe -m pip install pyclean
          ${{ env.WP_BINARY_DIR }}\python.exe -m pyclean ${{ env.WP_BINARY_DIR }}

      - name: Create Bundle
        run: |
          New-Item dist\endstone-win_amd64-portable\bin\python -ItemType Directory
          Copy-Item -Path ${{ env.WP_BINARY_DIR }}\* -Destination dist\endstone-win_amd64-portable\bin\python -Recurse
          Copy-Item -Path scripts\start.cmd -Destination dist\endstone-win_amd64-portable
          Copy-Item -Path CHANGELOG.md -Destination dist\endstone-win_amd64-portable
          Copy-Item -Path LICENSE -Destination dist\endstone-win_amd64-portable

      - name: Create Zip
        run: 7z a endstone-win_amd64-portable.zip .\dist\endstone-win_amd64-portable\*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: endstone-win_amd64-portable.zip
          name: endstone-win_amd64-portable.zip

  release:
    if: >
      (github.event_name == 'workflow_run' && startsWith(github.event.workflow_run.head_branch, 'v')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    needs: [ build ]
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Check version tag format
        id: check
        shell: bash
        run: |
          REF="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping release: '$REF' is not a version tag"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore Artifacts
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v7
        with:
          pattern: endstone-*
          path: dist
          merge-multiple: true

      - name: Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          files: dist/*
